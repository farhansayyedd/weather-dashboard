<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Weather Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;transition:all .25s ease}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
h1{font-size:1.8rem;font-weight:700;color:#58a6ff;margin-bottom:28px;letter-spacing:-.02em;text-align:center}
h1 span{color:#e6edf3}
.search{display:flex;gap:8px;width:100%;max-width:520px;margin-bottom:28px}
.search input{flex:1;padding:12px 18px;background:#161b22;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-size:1rem;outline:none}
.search input:focus{border-color:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.search button{padding:12px 22px;background:#58a6ff;border:none;border-radius:10px;color:#0d1117;font-weight:700;cursor:pointer;font-size:.95rem}
.search button:hover{background:#79b8ff;transform:scale(1.03)}
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:28px;width:100%;max-width:520px;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.city{font-size:1.9rem;font-weight:700;margin-bottom:2px}
.dt{font-size:.85rem;color:#8b949e;margin-bottom:20px}
.main-row{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.temp{font-size:4.5rem;font-weight:200;line-height:1}
.icon{font-size:4rem}
.desc{font-size:1rem;color:#8b949e;text-transform:capitalize;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:#0d1117;border-radius:10px;padding:14px;text-align:center}
.sval{font-size:1.15rem;font-weight:600;color:#58a6ff}
.slbl{font-size:.7rem;color:#8b949e;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.fc-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:#8b949e;margin-bottom:10px}
.fc-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.fc-day{background:#0d1117;border-radius:10px;padding:14px 10px;text-align:center;min-width:78px;flex-shrink:0}
.fc-lbl{font-size:.73rem;color:#8b949e;margin-bottom:6px}
.fc-ico{font-size:1.8rem;margin-bottom:6px}
.fc-hi{font-size:.9rem;font-weight:600}
.fc-lo{font-size:.78rem;color:#8b949e}
.err{color:#f85149;background:#1c1119;border:1px solid rgba(248,81,73,.2);border-radius:8px;padding:12px 16px;text-align:center;margin-bottom:16px;max-width:520px;width:100%;display:none}
.loading{color:#8b949e;font-size:.9rem;padding:20px;display:none}
.recent{width:100%;max-width:520px;margin-bottom:16px}
.recent-lbl{font-size:.73rem;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:4px 14px;font-size:.78rem;cursor:pointer;color:#8b949e}
.chip:hover{border-color:#58a6ff;color:#58a6ff}
</style>
</head>
<body>
<h1>⛅ Weather <span>Dashboard</span></h1>

<div class="search">
  <input id="city" type="text" placeholder="Search any city..." onkeydown="if(event.key==='Enter')search()"/>
  <button onclick="search()">Search</button>
</div>

<div id="recent" class="recent" style="display:none">
  <div class="recent-lbl">Recent Searches</div>
  <div id="chips" class="chips"></div>
</div>

<div id="err" class="err"></div>
<div id="loading" class="loading">Fetching weather data…</div>

<div id="cur" class="card" style="display:none">
  <div id="city-name" class="city"></div>
  <div id="date-time" class="dt"></div>
  <div class="main-row">
    <div id="icon" class="icon"></div>
    <div>
      <div id="temp" class="temp"></div>
      <div id="desc" class="desc"></div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div id="feels" class="sval"></div><div class="slbl">Feels Like</div></div>
    <div class="stat"><div id="humid" class="sval"></div><div class="slbl">Humidity</div></div>
    <div class="stat"><div id="wind" class="sval"></div><div class="slbl">Wind</div></div>
  </div>
</div>

<div id="fc" class="card" style="display:none">
  <div class="fc-title">5-Day Forecast</div>
  <div id="fc-row" class="fc-row"></div>
</div>

<script>
// Uses wttr.in — completely free, no API key needed
var ICONS={'Sunny':'☀️','Clear':'🌙','Partly cloudy':'⛅','Overcast':'☁️','Cloudy':'☁️','Mist':'🌫️','Patchy rain possible':'🌦️','Patchy snow possible':'🌨️','Blowing snow':'❄️','Thundery outbreaks possible':'⛈️','Rain':'🌧️','Drizzle':'🌦️','Snow':'❄️','Fog':'🌫️','Blizzard':'🌨️','Heavy rain':'🌧️','Light rain':'🌦️','Moderate rain':'🌧️','Light snow':'❄️','Heavy snow':'❄️'};
function icon(desc){for(var k in ICONS)if(desc.toLowerCase().includes(k.toLowerCase()))return ICONS[k];return '🌡️';}
function day(dt){return new Date(dt).toLocaleDateString('en',{weekday:'short'});}

var recent=JSON.parse(localStorage.getItem('wd_recent')||'[]');
function renderRecent(){
  if(!recent.length){document.getElementById('recent').style.display='none';return;}
  document.getElementById('recent').style.display='';
  document.getElementById('chips').innerHTML=recent.map(function(c){return '<div class="chip" onclick="quickSearch(\''+c+'\')">'+c+'</div>';}).join('');
}
function quickSearch(c){document.getElementById('city').value=c;search();}

async function search(){
  var city=document.getElementById('city').value.trim();
  if(!city)return;
  document.getElementById('err').style.display='none';
  document.getElementById('cur').style.display='none';
  document.getElementById('fc').style.display='none';
  document.getElementById('loading').style.display='block';
  try{
    var res=await fetch('https://wttr.in/'+encodeURIComponent(city)+'?format=j1');
    if(!res.ok)throw new Error('City not found');
    var d=await res.json();
    var cur=d.current_condition[0];
    var area=d.nearest_area[0];
    var areaName=area.areaName[0].value+', '+area.country[0].value;
    var desc=cur.weatherDesc[0].value;
    document.getElementById('city-name').textContent=areaName;
    document.getElementById('date-time').textContent=new Date().toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    document.getElementById('temp').textContent=cur.temp_C+'°C';
    document.getElementById('desc').textContent=desc;
    document.getElementById('icon').textContent=icon(desc);
    document.getElementById('feels').textContent=cur.FeelsLikeC+'°C';
    document.getElementById('humid').textContent=cur.humidity+'%';
    document.getElementById('wind').textContent=cur.windspeedKmph+' km/h';
    // 5-day forecast
    document.getElementById('fc-row').innerHTML=d.weather.map(function(w){
      return '<div class="fc-day"><div class="fc-lbl">'+day(w.date)+'</div><div class="fc-ico">'+icon(w.hourly[4].weatherDesc[0].value)+'</div><div class="fc-hi">'+w.maxtempC+'°</div><div class="fc-lo">'+w.mintempC+'°</div></div>';
    }).join('');
    document.getElementById('cur').style.display='';
    document.getElementById('fc').style.display='';
    recent=[city,...recent.filter(function(c){return c!==city;})].slice(0,5);
    localStorage.setItem('wd_recent',JSON.stringify(recent));
    renderRecent();
  }catch(e){
    document.getElementById('err').textContent='❌ '+e.message+'. Check city name and try again.';
    document.getElementById('err').style.display='block';
  }finally{document.getElementById('loading').style.display='none';}
}

// Geolocation detect
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(function(p){
    fetch('https://wttr.in/'+p.coords.latitude+','+p.coords.longitude+'?format=j1')
      .then(function(r){return r.json();})
      .then(function(d){
        var a=d.nearest_area[0].areaName[0].value;
        document.getElementById('city').value=a;
        search();
      }).catch(function(){});
  },function(){});
}
renderRecent();
</script>
</body>
</html>
